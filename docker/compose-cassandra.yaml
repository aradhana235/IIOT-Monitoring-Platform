services:
  cassandra:
    image: cassandra:latest
    container_name: iiot-cassandra
    hostname: cassandra

    ports:
      - "9042:9042"

    environment:
      CASSANDRA_CLUSTER_NAME: IIOTCluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M

    volumes:
      - cassandra-data:/var/lib/cassandra

    restart: unless-stopped

volumes:
  cassandra-data: